<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Krealogs — Invoice (Print)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="invoice.css" />
<style>
  body { background: #ffffff; }
  .sheet { display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 24px 0; }
  .page { width: 794px; height: 1123px; background: #fff; box-shadow: 0 8px 40px rgba(0,0,0,.12); overflow: hidden; }
  @page { size: A4; margin: 0; }
  @media print {
    html, body { margin: 0; padding: 0; }
    .sheet { gap: 0; padding: 0; }
    .page { box-shadow: none; break-after: page; page-break-after: always; }
    .page:last-child { break-after: auto; page-break-after: auto; }
    .invA, .invB { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="invoices.jsx"></script>
<script type="text/babel">
  function PrintSheet() {
    return (
      <div className="sheet">
        <div className="page"><window.InvoiceB /></div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<PrintSheet />);

  // auto-print once fonts + render settle
  (async () => {
    try { await document.fonts.ready; } catch (e) {}
    setTimeout(() => window.print(), 700);
  })();
</script>
</body>
</html>
